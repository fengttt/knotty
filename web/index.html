<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Knotty</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1a1a1a;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    #loading {
      position: fixed;
      top: 40%;
      width: 100%;
      text-align: center;
      font-size: 20px;
    }
    #loading small {
      display: block;
      margin-top: 8px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loading">
    Loading knotty…
    <small>~27 MB wasm, one-time download (browser will cache)</small>
  </div>
  <script src="wasm_exec.js"></script>
  <script>
    (async () => {
      const go = new Go();
      const resp = await fetch("knotty.wasm");
      const { instance } = await WebAssembly.instantiateStreaming(resp, go.importObject);
      document.getElementById("loading").remove();
      go.run(instance);
    })();
  </script>
</body>
</html>
